<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <!-- allows for flexible layout-->
      <meta name='viewport' content='width=device-width, initial-scale=1.0'>
      <title>Semantic HTML5 Registration</title>
      <link rel="stylesheet" href="./css/styles.css">
   </head>
   <body>
      <header>
        <h1>Homework: Forms</h1>
        <nav class="main-navbar">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./pages/register.html">Form</a></li>
            </ul>
        </nav>
      </header>
      <main>
         <form id="registrationForm" action="/submit" method="POST" novalidate>
            <!-- novalidate says override to JS based validation, not browser default.
               action = submit pretends to work
               Post wraps as a package, GET appends into url -->
            <header>
               <h2>Create Account</h2>
               <p>Please fill out the details below to register.</p>
            </header>
            <fieldset>
               <!-- gold standard now, use to show groupings of data in a form -->
               <legend>Identity</legend>
               <div class="identity-fields">
                  <p>
                     <label for='username'>Username</label>
                     <input type="text" id='username' name='userName' autofocus required minlength='3' >
                     <span class="error-message" id="username-error" aria-live="polite"></span>
                  </p>
                  <p>
                     <label for="user-email">Email Address</label>
                     <input type="email" id="user-email" name="user_email" required>
                     <!-- email will default look for @ -->
                     <span class="error-message" id="email-error" aria-live="polite"></span>
                  </p>
               </div>
            </fieldset>
            <fieldset>
               <legend>Security</legend>
               <p>
                  <label for="pwd">Password</label>
                  <span class="input-container">
                     <input  type="password" id="pwd" name="pwd" required 
                        aria-describedby="password-requirement" 
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]){.8,}" >
                     <button type="button" class="toggle-password" data-target="pwd">Show</button>
                  </span>
                  <progress id="strength-meter" value="0" max="4"></progress>
                  <small id="strength-text">Strength: Very Weak</small>
                  <ul id="password-requirements" class="checklist">
                     <li id="req-length" class="invalid">At least 8 characters</li>
                     <li id="req-number" class="invalid">At least one number</li>
                     <li id="req-lowercase" class="invalid">One lowercase letter</li>
                     <li id="req-uppercase" class="invalid">One uppercase letter</li>
                  </ul>
                  <span class="error-message" id="pwd-error" aria-live="polite"></span>
               </p>
               <p>
                  <label for="pwd-confirm">Confirm Password</label>
                  <span class="input-container">
                     <input type="password" id="pwd-confirm" name="pwd_confirm" required>
                     <button type="button" class="toggle-password" data-target="pwd-confirm">Show</button>
                  </span>
                  <span class="error-message" id="pwd-confirm-error" aria-live="polite"></span>
               </p>
            </fieldset>
            <fieldset>
               <legend>Preferences</legend>
               <p>
                  <label for="framework">Favorite Framework</label>
                  <input type="text" id="framework"
                     name="framework" 
                     aria-autocomplete="list"
                     list='framework-options'
                     placeholder="Start typing..."
                     role='combobox'   >
                     
                     <datalist id='framework-options'>
                     	<option value="React" >
                     	<option value="Vue.js" >
                     	<option value="Angular" >
                     	<option value="Svelte" >
                     </datalist>
                     
                     
               </p>
               <p>
                  <label for="theme-color">Profile Color</label>
                  <input  id="theme-color" name="fav_color" value="#3498db">
               </p>
            </fieldset>
            <section class="button-group">
               <button type='reset'  id="resetBtn"> Clear Form</button>
               <button type='submit' id="submitBtn"> Register</button>
               <!-- setting for default button actions -->
            </section>
         </form>
      </main>
      <script src="scriptForm.js"></script>
   </body>
</html>
